<title>Operations Procedures Review Tracker</title>
<style>
:root{--bg:#eef1f5;--surface:#fff;--surface-2:#f7f9fb;--ink:#16202e;--muted:#5b6775;--faint:#8a95a4;--border:#e0e5ec;--navy:#152B47;--amber:#F0B429;
--assigned:#0f6e56;--assigned-bg:#e1f5ee;--rob:#185fa5;--rob-bg:#e6f1fb;--ap:#534ab7;--ap-bg:#eeedfe;
--p1:#993c1d;--p1-bg:#faece7;--p2:#a32d2d;--p2-bg:#fcebeb;--qcbd:#854f0b;--qcbd-bg:#faeeda;--complete:#3b6d11;--complete-bg:#eaf3de;
--obspend:#a32d2d;--obspend-bg:#fcebeb;--obsappr:#993556;--obsappr-bg:#fbeaf0;--obsdone:#5f5e5a;--obsdone-bg:#e8e6df;--revise:#4d6a99;--revise-bg:#e9eff7;
--shadow:0 1px 2px rgba(18,32,48,.06),0 4px 16px rgba(18,32,48,.05);--radius:14px;--sans:"Segoe UI",-apple-system,BlinkMacSystemFont,Arial,sans-serif;}
@media(prefers-color-scheme:dark){:root{--bg:#0e1621;--surface:#16202e;--surface-2:#1b2735;--ink:#e8edf4;--muted:#9aa6b6;--faint:#6f7d8e;--border:#26313f;--navy:#0c1a2b;
--assigned:#5dcaa5;--assigned-bg:#0e3329;--rob:#7ec3ec;--rob-bg:#123147;--ap:#afa9ec;--ap-bg:#241f4a;
--p1:#f0997b;--p1-bg:#3a1f16;--p2:#f09595;--p2-bg:#3a1c1c;--qcbd:#efab3f;--qcbd-bg:#332714;--complete:#97c459;--complete-bg:#1f2e14;
--obspend:#f09595;--obspend-bg:#3a1c1c;--obsappr:#ed93b1;--obsappr-bg:#4b1528;--obsdone:#9aa6b6;--obsdone-bg:#242c38;--revise:#7fa3d8;--revise-bg:#152238;
--shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.25);}}
:root[data-theme="light"]{--bg:#eef1f5;--surface:#fff;--surface-2:#f7f9fb;--ink:#16202e;--muted:#5b6775;--faint:#8a95a4;--border:#e0e5ec;--navy:#152B47;--assigned:#0f6e56;--assigned-bg:#e1f5ee;--rob:#185fa5;--rob-bg:#e6f1fb;--ap:#534ab7;--ap-bg:#eeedfe;--p1:#993c1d;--p1-bg:#faece7;--p2:#a32d2d;--p2-bg:#fcebeb;--qcbd:#854f0b;--qcbd-bg:#faeeda;--complete:#3b6d11;--complete-bg:#eaf3de;--obspend:#a32d2d;--obspend-bg:#fcebeb;--obsappr:#993556;--obsappr-bg:#fbeaf0;--obsdone:#5f5e5a;--obsdone-bg:#e8e6df;--revise:#4d6a99;--revise-bg:#e9eff7;}
:root[data-theme="dark"]{--bg:#0e1621;--surface:#16202e;--surface-2:#1b2735;--ink:#e8edf4;--muted:#9aa6b6;--faint:#6f7d8e;--border:#26313f;--navy:#0c1a2b;--assigned:#5dcaa5;--assigned-bg:#0e3329;--rob:#7ec3ec;--rob-bg:#123147;--ap:#afa9ec;--ap-bg:#241f4a;--p1:#f0997b;--p1-bg:#3a1f16;--p2:#f09595;--p2-bg:#3a1c1c;--qcbd:#efab3f;--qcbd-bg:#332714;--complete:#97c459;--complete-bg:#1f2e14;--obspend:#f09595;--obspend-bg:#3a1c1c;--obsappr:#ed93b1;--obsappr-bg:#4b1528;--obsdone:#9aa6b6;--obsdone-bg:#242c38;--revise:#7fa3d8;--revise-bg:#152238;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1040px;margin:0 auto;padding:32px 22px 64px}
.eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);font-weight:700}
h1{font-size:clamp(24px,3.4vw,33px);line-height:1.15;margin:.28em 0 .15em;letter-spacing:-.01em}
.sub{color:var(--muted);font-size:15px;max-width:74ch}
.rule{height:3px;background:var(--amber);border-radius:2px;width:64px;margin:18px 0 22px}
.flowwrap{display:flex;flex-direction:column;gap:12px;margin-bottom:12px}
.flowcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px}
.flowcard h3{margin:0 0 8px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.flowcard.revise h3{color:var(--revise)}.flowcard.obsolete h3{color:var(--obspend)}
.flowscroll{overflow-x:auto}
.flowscroll svg{display:block}
.flowcap{font-size:11.5px;color:var(--muted);margin:8px 2px 0}
.rework2{font-size:12.5px;color:var(--muted);margin:0 2px 18px}
.rework2 b{color:var(--ink);font-weight:700}
.rework{font-size:12.5px;color:var(--muted);margin:0 2px 18px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.rework b{font-weight:700;color:var(--ink)}
.mini{font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:99px}
.mini.assigned{color:var(--assigned);background:var(--assigned-bg)}.mini.complete{color:var(--complete);background:var(--complete-bg)}.mini.p1{color:var(--p1);background:var(--p1-bg)}.mini.p2{color:var(--p2);background:var(--p2-bg)}.mini.obspend{color:var(--obspend);background:var(--obspend-bg)}.mini.obsappr{color:var(--obsappr);background:var(--obsappr-bg)}.mini.obsdone{color:var(--obsdone);background:var(--obsdone-bg)}
.bar{display:flex;align-items:center;gap:12px;margin:0 2px 12px;font-size:12px;color:var(--faint)}
.bar button{font:inherit;font-weight:700;color:var(--rob);background:none;border:1px solid var(--border);border-radius:99px;padding:3px 12px;cursor:pointer}
.bar button:hover{border-color:var(--rob)}
.tiles{display:flex;flex-wrap:wrap;gap:8px;margin:0 2px 12px;align-items:stretch}
.tile{border:1px solid var(--border);border-top-width:3px;border-radius:10px;padding:6px 12px;background:var(--surface);text-align:left;line-height:1.15;min-width:82px}
.tile .tn{display:block;font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--ink)}
.tile .tl{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-top:1px;max-width:130px}
.prog{flex:1;min-width:170px;border:1px solid var(--border);border-radius:10px;padding:8px 14px;background:var(--surface);display:flex;flex-direction:column;justify-content:center;gap:7px}
.prog .pl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;display:flex;justify-content:space-between;font-weight:700}
.prog .pl .pn{color:var(--complete)}
.prog .pbar{height:9px;border-radius:99px;background:color-mix(in srgb,var(--complete) 16%,transparent);overflow:hidden}
.prog .pfill{height:100%;background:var(--complete);border-radius:99px;transition:width .3s}
.filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:0 2px 12px}
.filters input,.filters select{font:inherit;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--ink)}
.filters input{min-width:190px}
.filters .fbtn{font-size:12px;font-weight:700;color:var(--rob);background:none;border:1px solid var(--border);border-radius:99px;padding:5px 12px;cursor:pointer}
.filters #count{font-size:12px;color:var(--faint);margin-left:auto}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:var(--ink)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.tblwrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:980px}
thead th{position:sticky;top:0;text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:700;padding:9px 12px;border-bottom:1px solid var(--border);background:var(--surface-2)}
tbody td{padding:7px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
td.num{font-variant-numeric:tabular-nums;font-weight:700;white-space:nowrap}
.star{color:var(--amber)}
tr.pri td{background:color-mix(in srgb,var(--amber) 7%,transparent)}
td.asg,td.due,td.upd{color:var(--muted);white-space:nowrap;font-size:12px}
td.upd{font-variant-numeric:tabular-nums}
td.due{font-variant-numeric:tabular-nums}
td.due.overdue{color:var(--p2);font-weight:700}
.dash{color:var(--faint)}
.note{font-size:11px;color:var(--faint);font-style:italic}
.chip{font-size:10.5px;font-weight:700;letter-spacing:.02em;padding:2px 9px;border-radius:99px;white-space:nowrap;display:inline-block}
.st-assigned{color:var(--assigned);background:var(--assigned-bg)}.st-rob{color:var(--rob);background:var(--rob-bg)}.st-ap{color:var(--ap);background:var(--ap-bg)}.st-p1{color:var(--p1);background:var(--p1-bg)}.st-p2{color:var(--p2);background:var(--p2-bg)}.st-qcbd{color:var(--qcbd);background:var(--qcbd-bg)}.st-complete{color:var(--complete);background:var(--complete-bg);font-weight:800}
.st-obspend{color:var(--obspend);background:var(--obspend-bg);border:1px dashed color-mix(in srgb,var(--obspend) 45%,transparent)}.st-obsappr{color:var(--obsappr);background:var(--obsappr-bg)}.st-obsdone{color:var(--obsdone);background:var(--obsdone-bg)}
.disp-obsolete{color:var(--obspend);background:var(--obspend-bg)}.disp-revise{color:var(--revise);background:var(--revise-bg)}
tr.obsdone td.num,tr.obsdone td.ttl{text-decoration:line-through;text-decoration-color:color-mix(in srgb,var(--obsdone) 55%,transparent);color:var(--obsdone)}
.banner{background:var(--qcbd-bg);color:var(--qcbd);border:1px solid color-mix(in srgb,var(--qcbd) 40%,transparent);border-radius:var(--radius);padding:14px 16px;font-size:13px;line-height:1.6}
.banner code{font-family:ui-monospace,Consolas,monospace;font-size:12px}
footer{margin-top:26px;padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--faint);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
</style>
<div class="wrap">

<h1>Operations Procedures Review Tracker</h1>
<div class="rule"></div>
<div class="flowwrap"><div class="flowcard"><div class="flowscroll"><svg viewBox="0 0 1080 252" style="width:100%;height:auto"><defs><marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="var(--faint)"/></marker></defs><rect x="20" y="128" width="150" height="46" rx="8" style="fill:var(--assigned-bg);stroke:var(--assigned)" stroke-width="1.5"/><text x="95" y="155" text-anchor="middle" style="fill:var(--assigned);font-weight:700;font-size:11px;font-family:var(--sans)">Assigned</text><rect x="250" y="58" width="170" height="46" rx="8" style="fill:var(--rob-bg);stroke:var(--rob)" stroke-width="1.5"/><text x="335" y="85" text-anchor="middle" style="fill:var(--rob);font-weight:700;font-size:11px;font-family:var(--sans)">Rob Review</text><rect x="470" y="58" width="190" height="46" rx="8" style="fill:var(--ap-bg);stroke:var(--ap)" stroke-width="1.5"/><text x="565" y="85" text-anchor="middle" style="fill:var(--ap);font-weight:700;font-size:11px;font-family:var(--sans)">Andrew Paola Review</text><rect x="250" y="198" width="220" height="46" rx="8" style="fill:var(--obsappr-bg);stroke:var(--obsappr)" stroke-width="1.5"/><text x="360" y="225" text-anchor="middle" style="fill:var(--obsappr);font-weight:700;font-size:11px;font-family:var(--sans)">Obsolescence Approval</text><rect x="720" y="128" width="180" height="46" rx="8" style="fill:var(--qcbd-bg);stroke:var(--qcbd)" stroke-width="1.5"/><text x="810" y="155" text-anchor="middle" style="fill:var(--qcbd);font-weight:700;font-size:11px;font-family:var(--sans)">QCBD Approval</text><rect x="940" y="128" width="120" height="46" rx="8" style="fill:var(--complete-bg);stroke:var(--complete)" stroke-width="1.5"/><text x="1000" y="155" text-anchor="middle" style="fill:var(--complete);font-weight:700;font-size:11px;font-family:var(--sans)">Complete</text><path d="M170 151 C 222 151 208 81 250 81" fill="none" stroke="var(--faint)" stroke-width="1.5" marker-end="url(#ah)"/><path d="M170 151 C 222 151 208 221 250 221" fill="none" stroke="var(--faint)" stroke-width="1.5" marker-end="url(#ah)"/><text x="205" y="100" text-anchor="middle" style="fill:var(--revise);font-size:10px;font-weight:700;font-family:var(--sans)">Revise</text><text x="205" y="200" text-anchor="middle" style="fill:var(--obspend);font-size:10px;font-weight:700;font-family:var(--sans)">Obsolete</text><line x1="420" y1="81" x2="470" y2="81" stroke="var(--faint)" stroke-width="1.5" marker-end="url(#ah)"/><path d="M660 81 C 705 81 686 140 720 140" fill="none" stroke="var(--faint)" stroke-width="1.5" marker-end="url(#ah)"/><path d="M470 221 C 620 221 686 162 720 162" fill="none" stroke="var(--faint)" stroke-width="1.5" marker-end="url(#ah)"/><line x1="900" y1="151" x2="940" y2="151" stroke="var(--faint)" stroke-width="1.5" marker-end="url(#ah)"/><path d="M319 58 C 319 14 351 14 351 58" fill="none" stroke="var(--faint)" stroke-width="1.5" marker-end="url(#ah)" stroke-dasharray="5 3"/><path d="M565 58 C 555 6 379 6 375 58" fill="none" stroke="var(--faint)" stroke-width="1.5" marker-end="url(#ah)" stroke-dasharray="5 3"/><text x="271" y="34" text-anchor="middle" style="fill:var(--assigned);font-size:9px;font-weight:700;font-family:var(--sans)">P1 Rework</text><text x="480" y="40" text-anchor="middle" style="fill:var(--assigned);font-size:9px;font-weight:700;font-family:var(--sans)">P2 Rework</text></svg></div></div></div><p class="rework2"><span class="star">★</span> <b>Priority</b> floats to the top of the list.</p>
<div class="bar"><button id="refresh" type="button">Refresh now</button><span id="status">Loading…</span></div>
<div id="tiles" class="tiles"></div>
<div class="filters">
<input id="q" type="text" placeholder="Search doc # or name" aria-label="Search">
<select id="fdisp" aria-label="Disposition"><option value="">All dispositions</option><option>Revise</option><option>Obsolete</option></select>
<select id="fasg" aria-label="Assignee"><option value="">All assignees</option></select>
<select id="fstat" aria-label="Status"><option value="">All statuses</option><option>Assigned</option><option>Rob Review</option><option>Andrew Paola Review</option><option>P1 Rework</option><option>P2 Rework</option><option>Obsolescence Approval</option><option>Waiting for QCBD Approval</option><option>Complete</option></select>
<select id="fpri" aria-label="Priority"><option value="">Priority: all</option><option value="yes">★ Priority only</option><option value="no">Non-priority</option></select>
<button id="clear" class="fbtn" type="button">Clear</button>
<span id="count"></span>

</div>
<script>
var SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTZN7qMpFEjCCD5HydKb7DKQBLFq9e5Th0HWDIzhD7gv9k6xQFzlfY1F9C9LhHpWLNH6OvBC2Y7qde-/pub?output=csv";
var LABELCLASS = {"Assigned": "assigned", "Rob Review": "rob", "Andrew Paola Review": "ap", "P1 Rework": "assigned", "P2 Rework": "assigned", "Waiting for QCBD Approval": "qcbd", "Complete": "complete", "Obsolescence Approval": "obsappr"};
var DISPCLASS = {"Obsolete": "obsolete", "Revise": "revise"};

function csvParse(text){
  var rows=[], row=[], f="", i=0, q=false, c;
  while(i<text.length){
    c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){f+='"';i++;} else q=false; }
      else f+=c;
    } else {
      if(c==='"') q=true;
      else if(c===','){ row.push(f); f=""; }
      else if(c==='\r'){}
      else if(c==='\n'){ row.push(f); rows.push(row); row=[]; f=""; }
      else f+=c;
    }
    i++;
  }
  if(f.length||row.length){ row.push(f); rows.push(row); }
  return rows;
}

function truthy(v){ v=(v||"").trim().toLowerCase(); return v==="yes"||v==="y"||v==="true"||v==="1"||v==="x"||v==="★"; }
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

var ALL=[];
var FILTERS={q:"",disp:"",asg:"",pri:"",stat:""};
var SORT={col:null,dir:1};
var STATUS_ORDER=["Assigned","Rob Review","Andrew Paola Review","P1 Rework","P2 Rework","Obsolescence Approval","Waiting for QCBD Approval","Complete"];

function classFor(s){ return LABELCLASS[s] || "assigned"; }

function drawTiles(){
  var counts={}; ALL.forEach(function(o){ counts[o.status]=(counts[o.status]||0)+1; });
  var seq=STATUS_ORDER.slice();
  Object.keys(counts).forEach(function(s){ if(seq.indexOf(s)<0) seq.push(s); });
  var h='<div class="tile" style="border-top-color:var(--amber)"><span class="tn">'+ALL.length+'</span><span class="tl">All</span></div>';
  seq.forEach(function(s){
    var cls=classFor(s), c=counts[s]||0;
    h+='<div class="tile" style="border-top-color:var(--'+cls+')"><span class="tn" style="color:var(--'+cls+')">'+c+'</span><span class="tl">'+esc(s)+'</span></div>';
  });
  var comp=counts["Complete"]||0, pct=ALL.length?Math.round(comp/ALL.length*100):0;
  h+='<div class="prog"><div class="pl"><span>Overall completion</span><span class="pn">'+pct+'% · '+comp+'/'+ALL.length+'</span></div><div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div></div>';
  document.getElementById("tiles").innerHTML=h;
}

function applyFilters(){
  var q=FILTERS.q.toLowerCase();
  return ALL.filter(function(o){
    if(FILTERS.stat && o.status!==FILTERS.stat) return false;
    if(FILTERS.disp && o.disp!==FILTERS.disp) return false;
    if(FILTERS.asg && o.assigned.toLowerCase().indexOf(FILTERS.asg.toLowerCase())<0) return false;
    if(FILTERS.pri==="yes" && !o.priority) return false;
    if(FILTERS.pri==="no" && o.priority) return false;
    if(q && (o.num+" "+o.title).toLowerCase().indexOf(q)<0) return false;
    return true;
  });
}

function sortList(list){
  var l=list.slice();
  if(!SORT.col){ l.sort(function(a,b){ if(a.priority!==b.priority) return a.priority?-1:1; return a._i-b._i; }); return l; }
  var k=SORT.col, d=SORT.dir;
  l.sort(function(a,b){ var av=(a[k]||"").toString().toLowerCase(), bv=(b[k]||"").toString().toLowerCase(); if(av<bv)return -d; if(av>bv)return d; return a._i-b._i; });
  return l;
}

function draw(){
  drawTiles();
  var list=sortList(applyFilters());
  var today=new Date(new Date().toDateString());
  var cols=[["num","Doc No."],["title","Procedure"],["disp","Requested Disposition"],["assigned","Assigned To"],["due","Due Date"],["status","Status"],["updated","Last Updated"]];
  var thead='<tr>'+cols.map(function(c){ var ar=SORT.col===c[0]?(SORT.dir>0?' \u25B2':' \u25BC'):''; return '<th class="sortable" data-k="'+c[0]+'">'+c[1]+ar+'</th>'; }).join('')+'</tr>';
  var body='';
  list.forEach(function(o){
    var cls=classFor(o.status);
    var rowcls=[o.priority?"pri":"", cls==="obsdone"?"obsdone":""].filter(Boolean).join(" ");
    var star=o.priority?'<span class="star" title="Priority">★</span> ':'';
    var overdue=false;
    if(o.due && cls!=="complete" && cls!=="obsdone"){ var dt=new Date(o.due); if(!isNaN(dt.getTime()) && dt<today) overdue=true; }
    var dcls=DISPCLASS[o.disp]||"";
    var dispCell=o.disp?(dcls?'<span class="chip disp-'+dcls+'">'+esc(o.disp)+'</span>':esc(o.disp)):'<span class="dash">—</span>';
    var asgCell=o.assigned?esc(o.assigned):'<span class="dash">—</span>';
    var dueCell=o.due?esc(o.due):'<span class="dash">—</span>';
    body+='<tr class="'+rowcls+'"><td class="num">'+star+esc(o.num)+'</td>'+
      '<td class="ttl">'+esc(o.title)+'</td>'+
      '<td>'+dispCell+'</td>'+
      '<td class="asg">'+asgCell+'</td>'+
      '<td class="due'+(overdue?' overdue':'')+'">'+dueCell+'</td>'+
      '<td><span class="chip st-'+cls+'">'+esc(o.status||"Assigned")+'</span></td>'+
      '<td class="upd">'+(o.updated?esc(o.updated):'<span class="dash">—</span>')+'</td></tr>';
  });
  document.getElementById("mount").innerHTML='<div class="card"><div class="tblwrap"><table><thead>'+thead+'</thead><tbody>'+body+'</tbody></table></div></div>';
  document.querySelectorAll('#mount th.sortable').forEach(function(th){ th.addEventListener('click',function(){ var k=th.getAttribute('data-k'); if(SORT.col===k) SORT.dir=-SORT.dir; else{SORT.col=k;SORT.dir=1;} draw(); }); });
  var cn=document.getElementById("count"); if(cn) cn.textContent=list.length+" of "+ALL.length;
}

function banner(msg){ document.getElementById("mount").innerHTML='<div class="banner">'+msg+'</div>'; }

function colIdx(headers, name){
  for(var i=0;i<headers.length;i++){ if(headers[i].trim().toLowerCase()===name) return i; }
  return -1;
}

function load(){
  var st=document.getElementById("status");
  if(!SHEET_CSV_URL || SHEET_CSV_URL.indexOf("PASTE_")===0){
    st.textContent="";
    banner('<b>Not connected yet.</b> Publish the Google Sheet to the web as CSV '+
      '(File → Share → Publish to web → Tracker tab → CSV) and send Rob the link, '+
      'then this dashboard goes live. Expected columns: <code>Doc No, Procedure, Note, Priority, Status</code>.');
    return;
  }
  st.textContent="Loading…";
  var url = SHEET_CSV_URL + (SHEET_CSV_URL.indexOf("?")>-1?"&":"?") + "_cb=" + Date.now();
  fetch(url).then(function(r){ if(!r.ok) throw new Error(r.status); return r.text(); })
  .then(function(txt){
    var rows = csvParse(txt).filter(function(r){ return r.some(function(c){return (c||"").trim();}); });
    if(!rows.length){ banner("The spreadsheet is empty."); return; }
    var h = rows[0];
    var iNum=colIdx(h,"doc no"), iTitle=colIdx(h,"procedure"), iNote=colIdx(h,"note"),
        iPri=colIdx(h,"priority"), iStat=colIdx(h,"status"),
        iAsg=colIdx(h,"assigned to"), iDue=colIdx(h,"due date"), iDisp=colIdx(h,"requested disposition"), iUpd=colIdx(h,"last updated");
    if(iNum<0||iTitle<0){ banner("Couldn't find the <code>Doc No</code> / <code>Procedure</code> columns. Don't rename the headers."); return; }
    var objs=[];
    for(var r=1;r<rows.length;r++){
      var row=rows[r];
      var num=(row[iNum]||"").trim();
      if(!num) continue;
      objs.push({
        _i:objs.length,
        num:num,
        title:(row[iTitle]||"").trim(),
        note:iNote>-1?(row[iNote]||"").trim():"",
        disp:iDisp>-1?(row[iDisp]||"").trim():"",
        assigned:iAsg>-1?(row[iAsg]||"").trim():"",
        due:iDue>-1?(row[iDue]||"").trim():"",
        updated:iUpd>-1?(row[iUpd]||"").trim():"",
        priority:iPri>-1?truthy(row[iPri]):false,
        status:iStat>-1?(row[iStat]||"").trim():"Assigned"
      });
    }
    ALL=objs;
    var nm={}; ALL.forEach(function(o){ o.assigned.split(",").forEach(function(n){ n=n.trim(); if(n) nm[n]=1; }); });
    var sel=document.getElementById("fasg"), cur=FILTERS.asg;
    sel.innerHTML='<option value="">All assignees</option>'+Object.keys(nm).sort().map(function(n){return '<option'+(n===cur?" selected":"")+'>'+esc(n)+'</option>';}).join('');
    draw();
    var t=new Date();
    st.textContent="Updated "+t.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})+" · "+objs.length+" procedures";
  })
  .catch(function(e){
    st.textContent="";
    banner('<b>Live data can\'t load here.</b> This is the live team dashboard — open it on GitHub Pages: '+
      '<a href="https://rwilbanks251-ctrl.github.io/aer-procedures-tracker/detailed.html">rwilbanks251-ctrl.github.io/aer-procedures-tracker/detailed.html</a>. '+
      '(The claude.ai artifact copy is blocked from fetching Google Sheets. If you ARE on GitHub Pages and see this, check the sheet is still published to the web. '+esc(String(e))+')');
  });
}

document.getElementById("q").addEventListener("input",function(e){FILTERS.q=e.target.value;draw();});
document.getElementById("fdisp").addEventListener("change",function(e){FILTERS.disp=e.target.value;draw();});
document.getElementById("fasg").addEventListener("change",function(e){FILTERS.asg=e.target.value;draw();});
document.getElementById("fstat").addEventListener("change",function(e){FILTERS.stat=e.target.value;draw();});
document.getElementById("fpri").addEventListener("change",function(e){FILTERS.pri=e.target.value;draw();});
document.getElementById("clear").addEventListener("click",function(){FILTERS={q:"",disp:"",asg:"",pri:"",stat:""};SORT={col:null,dir:1};document.getElementById("q").value="";document.getElementById("fdisp").value="";document.getElementById("fasg").value="";document.getElementById("fpri").value="";document.getElementById("fstat").value="";draw();});
document.getElementById("refresh").addEventListener("click", load);
load();
setInterval(load, 60000);
</script>
